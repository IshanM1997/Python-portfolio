<header class="navbar-custom">
  <div class="nav-container">
    <a href="#about" class="logo">
      <img src="assets/images/logo.png" alt="Ishan" class="logo-img"> Ishan.dev
    </a>
    <nav class="nav-menu" [class.active]="menuOpen">
      <a *ngFor="let link of navLinks" [href]="link.href" class="nav-link"
         [class.active]="activeSection === link.sectionId"
         [attr.aria-label]="link.label" (click)="closeMenu()">
        <i [class]="link.icon"></i>
      </a>
    </nav>
    <button class="hamburger" aria-label="Toggle Menu" (click)="toggleMenu()">
      <i [class]="menuOpen ? 'fas fa-times' : 'fas fa-bars'"></i>
    </button>
  </div>
</header>
